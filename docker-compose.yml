services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: ccf-mysql
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Go Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccf-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      
  # 3. React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ccf-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
