services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: ccf-mysql
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # NEW: Healthcheck ensures the DB is fully ready before the backend starts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Go Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccf-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    # NEW: Wait specifically for the DB healthcheck to pass, not just container start
    depends_on:
      db:
        condition: service_healthy
      
  # 3. React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ccf-frontend
    restart: always
    # NEW: Map Host port 80 to Container port 8080 (used by unprivileged Nginx)
    ports:
      - "80:8080"
    depends_on:
      - backend

volumes:
  mysql_data:
